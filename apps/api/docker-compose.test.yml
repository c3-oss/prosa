services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prosa
      POSTGRES_PASSWORD: prosa
      POSTGRES_DB: prosa_test
    ports:
      - "${PROSA_TEST_POSTGRES_PORT:-54329}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prosa -d prosa_test"]
      interval: 2s
      timeout: 2s
      retries: 30

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: prosa
      MINIO_ROOT_PASSWORD: prosa-minio
    ports:
      - "${PROSA_TEST_MINIO_PORT:-54392}:9000"
      - "${PROSA_TEST_MINIO_CONSOLE_PORT:-54393}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 2s
      retries: 30
