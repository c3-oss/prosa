version: 2

project_name: prosa

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: prosa
    main: ./cmd/prosa
    binary: prosa
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/c3-oss/prosa/internal/buildinfo.Version={{.Version}}
      - -X github.com/c3-oss/prosa/internal/buildinfo.Commit={{.Commit}}
      - -X github.com/c3-oss/prosa/internal/buildinfo.BuildDate={{.Date}}

  - id: prosa-server
    main: ./cmd/prosa-server
    binary: prosa-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/c3-oss/prosa/internal/buildinfo.Version={{.Version}}
      - -X github.com/c3-oss/prosa/internal/buildinfo.Commit={{.Commit}}
      - -X github.com/c3-oss/prosa/internal/buildinfo.BuildDate={{.Date}}

  - id: prosa-panel
    main: ./cmd/prosa-panel
    binary: prosa-panel
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/c3-oss/prosa/internal/buildinfo.Version={{.Version}}
      - -X github.com/c3-oss/prosa/internal/buildinfo.Commit={{.Commit}}
      - -X github.com/c3-oss/prosa/internal/buildinfo.BuildDate={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    files:
      - README.md
      - LICENSE*

homebrew_casks:
  - name: prosa
    binaries:
      - prosa
      - prosa-server
      - prosa-panel
    repository:
      owner: c3-oss
      name: homebrew-prosa
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: c3-oss-bot
      email: bot@c3.do
    homepage: "https://github.com/c3-oss/prosa"
    description: "Unified history of AI agent sessions across devices"
    directory: Casks
    caveats: |
      To finish setup, run:

        prosa setup

      That walks through device auth, installs the LaunchAgent
      that keeps history in sync, and imports the first batch of
      AI-agent sessions.

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]-]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]-]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

release:
  draft: false
  prerelease: auto
  name_template: '{{ .ProjectName }} {{ .Version }}'
