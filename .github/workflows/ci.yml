name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main, 'feature/**']

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gates:
    name: Workspace gates (build, typecheck, test, lint, audit)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck (Turbo aggregate; includes prosa-types-v2 + prosa-wire-v2)
        run: pnpm typecheck

      - name: Test (Turbo aggregate; per-package vitest including v2)
        run: pnpm test

      - name: Lint (Biome aggregate)
        run: pnpm lint

      - name: Conformance test (canonical Merkle leaves)
        run: pnpm test:conformance

      - name: Audit (moderate)
        run: pnpm audit --audit-level moderate
        continue-on-error: true

      - name: git diff --check
        run: git diff --check
