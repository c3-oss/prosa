name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_OWNER: ${{ github.repository_owner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # HOMEBREW_TAP_TOKEN is a classic PAT with repo scope on
          # c3-oss/homebrew-prosa. goreleaser uses it to push the
          # updated Casks/prosa.rb on each release. Rotate every
          # 6 months (see docs/release-runbook.md).
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Set up Node.js for npm publish
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish npm packages
        run: ./scripts/publish-npm.sh
        env:
          # NPM_TOKEN is a granular access token scoped to the
          # @c3-oss org; required to publish @c3-oss/prosa and the
          # four platform sub-packages.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Three images, one per binary, sharing the Dockerfile's `build`
      # stage via buildx cache. Each image is published at
      # ghcr.io/<owner>/<binary> with the release tag and `latest`.

      - name: Docker meta — prosa (CLI)
        id: meta-cli
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/prosa
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push prosa (CLI) image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: prosa
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-cli.outputs.tags }}
          labels: ${{ steps.meta-cli.outputs.labels }}

      - name: Docker meta — prosa-server
        id: meta-server
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/prosa-server
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push prosa-server image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: prosa-server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}

      - name: Docker meta — prosa-panel
        id: meta-panel
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/prosa-panel
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push prosa-panel image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: prosa-panel
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-panel.outputs.tags }}
          labels: ${{ steps.meta-panel.outputs.labels }}
