syntax = "proto3";

package prosa.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/c3-oss/prosa/gen/go/prosa/v1;prosav1";

// SessionsService is the prosa session lifecycle surface — clients push
// every session they observe (idempotent by sha256 hash) and read them
// back via List/Get/Search.
service SessionsService {
  // Push uploads one session's metadata + turns + tool counters along
  // with the verbatim raw transcript body. Idempotent: when the server
  // already has the same raw_hash, the request short-circuits and
  // PushResponse.skipped is true.
  rpc Push(PushRequest) returns (PushResponse);

  // PushChunk uploads one session's raw transcript in bounded unary
  // chunks so large raw files don't exceed the per-message transport
  // limit. The server commits metadata only after the final chunk
  // reconstructs the full raw_size/raw_hash. Idempotency matches Push.
  rpc PushChunk(PushChunkRequest) returns (PushChunkResponse);

  // List returns sessions matching the filter, newest first.
  rpc List(ListRequest) returns (ListResponse);

  // Get returns one session by id.
  rpc Get(GetRequest) returns (GetResponse);

  // Search runs a Postgres FTS query (tsvector + plainto_tsquery) over
  // every assistant/user turn the caller has access to.
  rpc Search(SearchRequest) returns (SearchResponse);

  // Manifest returns a paginated catalog of (id, raw_hash) for every
  // session the server has for the caller's device. Clients call this
  // before pushing so they can detect and catch up sessions that exist
  // locally but never reached the server.
  rpc Manifest(ManifestRequest) returns (ManifestResponse);

  // GetRaw streams the verbatim raw transcript bytes via a byte-range
  // window. The panel's side panel uses it to render the JSONL body
  // incrementally without loading the whole object into memory.
  rpc GetRaw(GetRawRequest) returns (GetRawResponse);

  // ListChildren returns every session whose parent_session_id matches
  // the requested id. Used by the panel to surface "Ran N agents"
  // expansion on Claude Code Agent tool results and on Codex sessions
  // spawned via thread_spawn.
  rpc ListChildren(ListChildrenRequest) returns (ListChildrenResponse);
}

// Session mirrors pkg/session.Session. Nullable client-side fields use
// empty-string sentinel here for proto3 simplicity; the server treats
// "" as NULL on write.
message Session {
  string id = 1;
  string agent = 2;
  string device_id = 3;
  string project_path = 4;
  string project_remote = 5;
  string project_marker = 6;
  google.protobuf.Timestamp started_at = 7;
  google.protobuf.Timestamp last_activity_at = 8;
  string first_prompt = 9;
  string model = 10;
  string raw_hash = 11;
  int64 raw_size = 12;
  // Populated on List/Get/Search responses; ignored on Push.
  string raw_uri = 13;
  TokenUsage usage = 14;
  // parent_session_id is set on subagent/spawned sessions. Claude
  // Code: the directory above the `subagents/` folder; Codex:
  // session_meta.payload.source.subagent.thread_spawn.parent_thread_id.
  // Empty string means "top-level session".
  string parent_session_id = 15;
  // profile is the per-agent, per-device profile the session was imported
  // from (e.g. an alternate CODEX_HOME). Empty string is treated as
  // "default" on write, so older clients keep working.
  string profile = 16;
}

message TokenUsage {
  int64 total_tokens = 1;
  int64 input_tokens = 2;
  int64 output_tokens = 3;
  int64 cached_tokens = 4;
  int64 cache_read_tokens = 5;
  int64 cache_creation_tokens = 6;
}

message Turn {
  string role = 1;            // "user" | "assistant" | "tool"
  string content = 2;
  google.protobuf.Timestamp ts = 3;
  // kind tags how the importer projected the original record: "message"
  // for chat content, "tool_result" for projected tool outputs, or
  // "operational" for non-conversational events. Empty string is
  // treated as "message" so legacy proto payloads stay valid.
  string kind = 4;
  // tool_name carries the originating tool when kind=tool_result;
  // empty otherwise.
  string tool_name = 5;
}

message ToolUsage {
  string name = 1;
  int32 count = 2;
}

message PushRequest {
  Session session = 1;
  repeated Turn turns = 2;
  repeated ToolUsage tools = 3;
  // raw is the verbatim source file bytes. Large raws should use
  // PushChunk so each transport message stays below the server's
  // configured request cap.
  bytes raw = 4;
}

message PushChunkRequest {
  // session must accompany every chunk: it keys the server-side staging
  // file and drives the idempotency check. turns and tools are only read
  // on the final chunk (they are committed with the reconstructed raw);
  // senders may omit them on non-final chunks.
  Session session = 1;
  repeated Turn turns = 2;
  repeated ToolUsage tools = 3;
  // offset is the starting byte position of raw_chunk in the complete
  // raw transcript. The server rejects gaps, overlaps, and out-of-order
  // chunks so retries cannot silently corrupt the reconstructed file.
  int64 offset = 4;
  bytes raw_chunk = 5;
  // final tells the server to validate the reconstructed raw_size and
  // raw_hash, upload the raw object, and commit metadata transactionally.
  bool final = 6;
}

message PushResponse {
  // True when the caller's raw_hash already matched the recorded
  // sync_state — server did nothing.
  bool skipped = 1;
  // s3:// URI of where the raw lives now; useful for debugging.
  string raw_uri = 2;
}

message PushChunkResponse {
  // True when the caller's raw_hash already matched the recorded
  // sync_state — server did nothing.
  bool skipped = 1;
  // True when a non-final chunk was accepted and staged server-side.
  bool accepted = 2;
  // s3:// URI of where the raw lives now; useful for debugging.
  string raw_uri = 3;
}

// ListRequest mirrors internal/store/SessionFilter. Time bounds are
// required by the server; everything else is optional.
message ListRequest {
  google.protobuf.Timestamp since = 1;
  google.protobuf.Timestamp until = 2;
  string project_path = 3;     // exact match
  string project_match = 4;    // substring
  string project_remote = 5;
  string project_marker = 6;
  string agent = 7;
  string device_name = 8;      // matches devices.friendly_name
  int32 limit = 9;             // default 200
  // device_names is the panel-side multi-select equivalent of
  // device_name. When non-empty, the server matches any device whose
  // friendly_name is in the list (device_name is ignored).
  repeated string device_names = 10;
  // query, when non-empty, restricts results to sessions containing a
  // turn whose content matches the FTS query (plainto_tsquery). Ranks
  // are then used to order results, overriding sort_by.
  string query = 11;
  // offset is the 0-based row offset for paged reads. Clamped to >= 0
  // by the server. Pair with limit for page-N navigation.
  int32 offset = 12;
  // sort_by selects the column. Allowed values: "" (default,
  // started_at), "started_at", "total_tokens", "agent", "project",
  // "device". Any other value is rejected. Ignored when query is set
  // (FTS rank wins). Cost sorting is handled in the panel (not stored
  // server-side). Direction is controlled by sort_dir.
  string sort_by = 13;
  // sort_dir selects ascending or descending order for sort_by.
  // Allowed values: "" (column default: started_at and total_tokens
  // desc; agent, project, device asc), "asc", "desc". Ignored when
  // query is set (FTS rank wins).
  string sort_dir = 14;
  // agents is the panel-side multi-select equivalent of agent. When
  // non-empty, the server matches any session whose agent is in the list
  // (agent is ignored).
  repeated string agents = 15;
  // project_matches is the multi-select equivalent of project_match. When
  // non-empty, a session matches if any of the values is a substring of
  // its project_path / project_remote / project_marker (project_match is
  // ignored).
  repeated string project_matches = 16;
  // top_level_only restricts results to sessions with no parent (i.e.
  // not a subagent / child session). The panel uses this to render the
  // Sessions table grouped by parent without double-counting children
  // as top-level rows. Pagination + total_count apply to the filtered
  // (parent-only) set.
  bool top_level_only = 17;
  // profile matches sessions.profile exactly (CLI --profile). Empty means
  // "no profile filter".
  string profile = 18;
  // profiles is the panel-side multi-select equivalent of profile. When
  // non-empty, the server matches any session whose profile is in the list
  // (profile is ignored).
  repeated string profiles = 19;
}

message ListResponse {
  repeated Session sessions = 1;
  // total_count is the number of rows that match the request's filters
  // (and query, when set), ignoring limit/offset. Lets paginators
  // render "page N of M" without a separate count call.
  int64 total_count = 2;
}

message GetRequest {
  string id = 1;
}

message GetResponse {
  Session session = 1;
  repeated Turn turns = 2;
  repeated ToolUsage tools = 3;
}

message SearchRequest {
  string query = 1;
  google.protobuf.Timestamp since = 2;
  google.protobuf.Timestamp until = 3;
  string project_remote = 4;
  string project_marker = 5;
  string agent = 6;
  string device_name = 7;
  int32 limit = 8;
  // device_names is the panel-side multi-select equivalent of
  // device_name. When non-empty, the server matches any device whose
  // friendly_name is in the list (device_name is ignored).
  repeated string device_names = 9;
  // profile matches sessions.profile exactly. Empty means no profile filter.
  string profile = 10;
}

message SearchHit {
  Session session = 1;
  string snippet = 2;
  string role = 3;
  // turn_id is the matching turn's primary key — stable within one
  // session; lets agents fetch evidence directly.
  int64 turn_id = 4;
  // turn_ts is the timestamp of the matching turn.
  google.protobuf.Timestamp turn_ts = 5;
  // kind mirrors Turn.kind for the matched turn.
  string kind = 6;
  // tool_name mirrors Turn.tool_name for the matched turn.
  string tool_name = 7;
  // match_field reports which document field produced the match. For
  // now always "turn.content"; reserved for future session-level
  // matches.
  string match_field = 8;
  // rank is the FTS ranking score; lower means better in SQLite's
  // bm25, higher means better in Postgres ts_rank — clients should
  // sort within a result set, not compare across backends.
  double rank = 9;
}

message SearchResponse {
  repeated SearchHit hits = 1;
}

message ManifestRequest {
  // Opaque cursor: the last session.id from the previous page, or ""
  // for the first page.
  string after_id = 1;
  // 1..5000, default 1000.
  int32 limit = 2;
}

message ManifestEntry {
  string id = 1;
  string raw_hash = 2;
  google.protobuf.Timestamp last_synced_at = 3;
  int32 projection_version = 4;
}

message ManifestResponse {
  repeated ManifestEntry entries = 1;
  // Empty when the caller has paged through every row.
  string next_after_id = 2;
}

message GetRawRequest {
  string id = 1;
  // Byte offset into the raw transcript. 0 starts a fresh read.
  int64 offset = 2;
  // Bytes to return in this chunk. Clamped to [1, 1_048_576]; 0 falls
  // back to the server default of 65 536 (64 KiB).
  int32 limit = 3;
}

message GetRawResponse {
  bytes chunk = 1;
  // Full object size in bytes, as reported by the object store. Lets
  // the client compute a progress percentage without a separate Stat.
  int64 total_size = 2;
  // True when offset + len(chunk) >= total_size; the client should
  // stop calling GetRaw for this id.
  bool eof = 3;
}

message ListChildrenRequest {
  // parent_id is the session whose direct children we want. Returns
  // an empty list (not an error) when no children exist.
  string parent_id = 1;
}

message ListChildrenResponse {
  repeated Session sessions = 1;
}
