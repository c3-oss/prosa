syntax = "proto3";

package prosa.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/c3-oss/prosa/gen/go/prosa/v1;prosav1";

// SessionsService is the prosa session lifecycle surface — clients push
// every session they observe (idempotent by sha256 hash) and read them
// back via List/Get/Search.
service SessionsService {
  // Push uploads one session's metadata + turns + tool counters along
  // with the verbatim raw transcript body. Idempotent: when the server
  // already has the same raw_hash, the request short-circuits and
  // PushResponse.skipped is true.
  rpc Push(PushRequest) returns (PushResponse);

  // List returns sessions matching the filter, newest first.
  rpc List(ListRequest) returns (ListResponse);

  // Get returns one session by id.
  rpc Get(GetRequest) returns (GetResponse);

  // Search runs a Postgres FTS query (tsvector + plainto_tsquery) over
  // every assistant/user turn the caller has access to.
  rpc Search(SearchRequest) returns (SearchResponse);
}

// Session mirrors pkg/session.Session. Nullable client-side fields use
// empty-string sentinel here for proto3 simplicity; the server treats
// "" as NULL on write.
message Session {
  string id = 1;
  string agent = 2;
  string device_id = 3;
  string project_path = 4;
  string project_remote = 5;
  string project_marker = 6;
  google.protobuf.Timestamp started_at = 7;
  google.protobuf.Timestamp last_activity_at = 8;
  string first_prompt = 9;
  string model = 10;
  string raw_hash = 11;
  int64 raw_size = 12;
  // Populated on List/Get/Search responses; ignored on Push.
  string raw_uri = 13;
}

message Turn {
  string role = 1;            // "user" | "assistant"
  string content = 2;
  google.protobuf.Timestamp ts = 3;
}

message ToolUsage {
  string name = 1;
  int32 count = 2;
}

message PushRequest {
  Session session = 1;
  repeated Turn turns = 2;
  repeated ToolUsage tools = 3;
  // raw is the verbatim source file bytes. Capped at 32 MiB by the
  // server; oversize sessions surface as a clear error.
  bytes raw = 4;
}

message PushResponse {
  // True when the caller's raw_hash already matched the recorded
  // sync_state — server did nothing.
  bool skipped = 1;
  // s3:// URI of where the raw lives now; useful for debugging.
  string raw_uri = 2;
}

// ListRequest mirrors internal/store/SessionFilter. Time bounds are
// required by the server; everything else is optional.
message ListRequest {
  google.protobuf.Timestamp since = 1;
  google.protobuf.Timestamp until = 2;
  string project_path = 3;     // exact match
  string project_match = 4;    // substring
  string project_remote = 5;
  string project_marker = 6;
  string agent = 7;
  string device_name = 8;      // matches devices.friendly_name
  int32 limit = 9;             // default 200
}

message ListResponse {
  repeated Session sessions = 1;
}

message GetRequest {
  string id = 1;
}

message GetResponse {
  Session session = 1;
  repeated Turn turns = 2;
  repeated ToolUsage tools = 3;
}

message SearchRequest {
  string query = 1;
  google.protobuf.Timestamp since = 2;
  google.protobuf.Timestamp until = 3;
  string project_remote = 4;
  string project_marker = 5;
  string agent = 6;
  string device_name = 7;
  int32 limit = 8;
}

message SearchHit {
  Session session = 1;
  string snippet = 2;
  string role = 3;
}

message SearchResponse {
  repeated SearchHit hits = 1;
}
