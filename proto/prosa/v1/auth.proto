syntax = "proto3";

package prosa.v1;

option go_package = "github.com/c3-oss/prosa/gen/go/prosa/v1;prosav1";

import "google/protobuf/timestamp.proto";

// AuthService implements PKCE + localhost-callback login for the CLI.
// The CLI calls BeginLogin, opens authorize_url in a browser, receives
// an auth code on 127.0.0.1, then calls ExchangeCode for the bearer.
// The panel calls GetLoginRequest + ApproveLogin (admin-gated).
service AuthService {
  // Registers a PENDING login attempt and returns the panel URL to open.
  rpc BeginLogin(BeginLoginRequest) returns (BeginLoginResponse);

  // Exchanges an approved auth code + PKCE verifier for a device bearer.
  rpc ExchangeCode(ExchangeCodeRequest) returns (ExchangeCodeResponse);

  // Returns login attempt metadata for the panel confirmation page.
  // Requires Authorization: Admin <PROSA_ADMIN_TOKEN>.
  rpc GetLoginRequest(GetLoginRequestRequest) returns (GetLoginRequestResponse);

  // Approves a PENDING attempt and mints a one-time auth code for redirect.
  // Requires Authorization: Admin <PROSA_ADMIN_TOKEN>.
  rpc ApproveLogin(ApproveLoginRequest) returns (ApproveLoginResponse);

  // Identifies the calling device.
  rpc Whoami(WhoamiRequest) returns (WhoamiResponse);
}

message BeginLoginRequest {
  string hostname = 1;
  string device_fingerprint = 2;
  string code_challenge = 3;       // base64url(SHA256(verifier)), method S256
  string redirect_uri = 4;          // http://127.0.0.1:<port>/callback
  string client_state = 5;          // opaque; echoed on redirect
}

message BeginLoginResponse {
  string authorize_url = 1;
  string request_id = 2;
  int32 expires_in = 3;             // seconds until PENDING auto-expires
}

message ExchangeCodeRequest {
  string code = 1;
  string code_verifier = 2;
  string redirect_uri = 3;
}

message ExchangeCodeResponse {
  string token = 1;
  string device_id = 2;
}

message GetLoginRequestRequest {
  string request_id = 1;
}

message GetLoginRequestResponse {
  string hostname = 1;
  string fingerprint = 2;
  google.protobuf.Timestamp expires_at = 3;
  string state = 4;                 // PENDING, APPROVED, USED, EXPIRED
}

message ApproveLoginRequest {
  string request_id = 1;
}

message ApproveLoginResponse {
  string code = 1;
  string redirect_uri = 2;
  string client_state = 3;
}

message WhoamiRequest {}

message WhoamiResponse {
  string device_id = 1;
  string hostname = 2;
  string friendly_name = 3;
}
