{{define "base"}}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{.Title}} · prosa</title>
  <link rel="stylesheet" href="{{assetPath "style.css"}}">
  <script src="{{assetPath "htmx.min.js"}}"></script>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <a class="brand" href="/">prosa</a>
      <div class="topbar-right">
        <a href="/sessions?last=12h" title="new sessions since last visit">
          <span id="new-sessions-count" class="badge zero">0</span>
        </a>
        <form method="post" action="/logout" style="display:inline">
          <input type="hidden" name="csrf" value="{{.CSRF}}">
          <button class="btn" type="submit">logout</button>
        </form>
      </div>
    </header>
    <nav class="sidebar">
      <a href="/" class="{{if eq .Nav "home"}}active{{end}}">Home</a>
      <a href="/sessions" class="{{if eq .Nav "sessions"}}active{{end}}">Sessions</a>
      <a href="/projects" class="{{if eq .Nav "projects"}}active{{end}}">Projects</a>
      <a href="/devices" class="{{if eq .Nav "devices"}}active{{end}}">Devices</a>
      <a href="/settings" class="{{if eq .Nav "settings"}}active{{end}}">Settings</a>
    </nav>
    <main class="main">
      {{block "content" .}}{{end}}
    </main>
    <aside id="side-panel">{{block "side" .}}{{end}}</aside>
  </div>
  <script defer src="{{assetPath "alpine-collapse.min.js"}}"></script>
  <script defer src="{{assetPath "alpine.min.js"}}"></script>
  <script src="{{assetPath "keyboard.js"}}"></script>
  <script src="{{assetPath "sse.js"}}"></script>
  <script src="{{assetPath "widgets.js"}}"></script>
</body>
</html>{{end}}
