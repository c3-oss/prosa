{{define "settings"}}{{template "base" .}}{{end}}
{{define "side"}}{{end}}
{{define "content"}}
  <h1>Settings</h1>

  <section class="settings-card">
    <h2>Logged in as</h2>
    <dl>
      <dt>Email</dt>
      <dd>{{.Email}}</dd>
    </dl>
    <form method="post" action="/logout">
      <input type="hidden" name="csrf" value="{{.CSRF}}">
      <button class="btn" type="submit">Log out</button>
    </form>
  </section>

  <section class="settings-card"
           x-data="{
             theme: '{{.Current}}',
             csrf: '{{.CSRF}}',
             status: '',
             apply(t) {
               this.theme = t;
               document.documentElement.dataset.theme = t;
               this.status = 'Saving...';
               var self = this;
               var body = new URLSearchParams();
               body.set('theme', t);
               body.set('csrf', this.csrf);
               fetch('/settings/theme', {
                 method: 'POST',
                 headers: { 'HX-Request': 'true', 'Content-Type': 'application/x-www-form-urlencoded' },
                 body: body.toString()
               }).then(function (r) { self.status = r.ok ? 'Saved' : 'Save failed'; })
                 .catch(function () { self.status = 'Save failed'; });
             }
           }">
    <h2>Appearance</h2>
    <p class="settings-hint">
      Saved to your account — applies immediately and follows you across browsers.
      <span class="settings-status" x-text="status"></span>
    </p>
    <div class="theme-options" role="radiogroup" aria-label="Theme">
      {{range .Themes}}
      <label class="theme-option" :class="{ 'is-active': theme === '{{.ID}}' }">
        <input type="radio" name="theme" value="{{.ID}}"
               :checked="theme === '{{.ID}}'" @change="apply('{{.ID}}')">
        <span class="theme-swatch" aria-hidden="true">
          {{range .Swatch}}<span class="theme-swatch-dot" style="background: {{.}}"></span>{{end}}
        </span>
        <span class="theme-option-label">{{.Label}}</span>
        <span class="theme-option-hint">{{.Hint}}</span>
      </label>
      {{end}}
    </div>
  </section>
{{end}}
