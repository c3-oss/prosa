{{define "cli_authorize"}}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Authorize CLI · prosa</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div class="center">
    <div class="login-box login-box-wide">
      <h1>Authorize CLI</h1>
      <p class="text-muted">
        A device is requesting access to your prosa server.
      </p>
      <dl>
        <dt class="text-muted">Hostname</dt>
        <dd class="text-mono">{{.Hostname}}</dd>
        <dt class="text-muted">Device ID</dt>
        <dd class="text-mono" style="word-break: break-all">{{.Fingerprint}}</dd>
        <dt class="text-muted">Expires</dt>
        <dd>{{.ExpiresAt}}</dd>
      </dl>
      {{if .Error}}
        <p style="color: var(--danger)">{{.Error}}</p>
      {{else}}
        <form method="post" action="/cli/authorize/approve">
          <input type="hidden" name="request_id" value="{{.RequestID}}">
          <button class="btn btn-primary btn-full" type="submit">Authorize this device</button>
        </form>
        <p style="text-align: center">
          <a class="text-muted" href="/">Cancel</a>
        </p>
      {{end}}
    </div>
  </div>
</body>
</html>{{end}}
