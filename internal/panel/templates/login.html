{{define "login"}}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login · prosa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/css/geist@latest/index.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/css/geist-mono@latest/index.css">
  <link rel="stylesheet" href="{{assetPath "style.css"}}">
</head>
<body>
  <div class="center">
    <div class="login-box">
      <h1>prosa</h1>
      <p>{{.Tagline}}</p>
      {{if .GitHubURL}}
        <a class="btn btn-primary" href="{{.GitHubURL}}">Sign in with GitHub</a>
      {{end}}
      {{if .DevLoginEnabled}}
        <form method="post" action="/dev-login">
          <input type="hidden" name="csrf" value="{{.CSRF}}">
          <button class="btn" type="submit">Dev login as {{.DevLoginEmail}}</button>
        </form>
        <div class="dev-warn">
          PROSA_PANEL_DEV_LOGIN is set — OAuth is bypassed locally.<br>
          Do NOT enable in production.
        </div>
      {{end}}
      {{if .Error}}
        <p style="color: var(--danger)">{{.Error}}</p>
      {{end}}
    </div>
  </div>
</body>
</html>{{end}}
